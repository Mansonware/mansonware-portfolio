<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfólio de Mansonware — Cybersecurity, Linux, Automação e Ethical Hacking.">
  <meta name="author" content="Mansonware">
  <meta name="theme-color" content="#00ff88">
  <title>Mansonware // Boot Sequence</title>

  <style>
    :root {
      --bg: #000000;
      --accent: #00ff88;
      --font: "Courier New", monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--accent);
      font-family: var(--font);
      overflow-x: hidden;
    }

    canvas#matrix {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .boot {
      padding: clamp(20px, 5vw, 40px);
      white-space: pre-line;
      font-size: clamp(12px, 2.5vw, 14px);
      line-height: 1.6;
      text-shadow: 0 0 6px var(--accent);
      min-height: 220px;
    }

    .cursor {
      display: inline-block;
      width: 9px;
      height: 1em;
      vertical-align: text-bottom;
      background: var(--accent);
      animation: blink 0.8s steps(1) infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .center {
      text-align: center;
      margin-top: 24px;
      padding: 0 20px 48px;
    }

    .center h1 {
      font-size: clamp(28px, 7vw, 44px);
      margin: 0 0 8px;
      text-shadow: 0 0 12px var(--accent);
    }

    .center p {
      opacity: 0.85;
      letter-spacing: 1px;
      margin: 0 0 24px;
    }

    .btn {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 24px;
      border: 1px solid var(--accent);
      border-radius: 4px;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 1px;
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover,
    .btn:focus-visible {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 16px var(--accent);
      outline: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .cursor { animation: none; }
    }
  </style>
</head>

<body>
  <canvas id="matrix" aria-hidden="true"></canvas>

  <main>
    <div class="boot" id="boot" role="log" aria-live="polite"></div>

    <div class="center">
      <h1>💀 Mansonware</h1>
      <p>Cybersecurity • Linux • Automation • Ethical Hacking</p>

      <a class="btn" href="https://github.com/Mansonware" target="_blank" rel="noopener noreferrer">
        ACCESS GITHUB
      </a>
    </div>
  </main>

  <script>
    "use strict";

    /* ===== MATRIX BACKGROUND ===== */
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    const FONT_SIZE = 14;
    const CHARS = "01MANS0NWAR3CYBERSECURITYLINUXHACK".split("");
    let drops = [];

    function setupMatrix() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const columns = Math.ceil(canvas.width / FONT_SIZE);
      drops = new Array(columns).fill(1);
    }

    function drawMatrix() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#00ff88";
      ctx.font = FONT_SIZE + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = CHARS[Math.floor(Math.random() * CHARS.length)];
        ctx.fillText(text, i * FONT_SIZE, drops[i] * FONT_SIZE);

        if (drops[i] * FONT_SIZE > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setupMatrix();
    setInterval(drawMatrix, 33);
    window.addEventListener("resize", setupMatrix);

    /* ===== BOOT SEQUENCE ===== */
    const lines = [
      "Booting Mansonware system...",
      "Loading modules: Linux ✓",
      "Loading modules: Networking ✓",
      "Loading modules: Python Automation ✓",
      "Initializing cybersecurity environment...",
      "Establishing secure shell...",
      "Access granted ✔",
      "Welcome, operator."
    ];

    const boot = document.getElementById("boot");
    let lineIndex = 0;

    function typeLine() {
      if (lineIndex < lines.length) {
        boot.textContent += lines[lineIndex] + "\n";
        lineIndex++;
        setTimeout(typeLine, 800);
      } else {
        boot.textContent += "\n> system ready ";
        const cursor = document.createElement("span");
        cursor.className = "cursor";
        boot.appendChild(cursor);
      }
    }

    typeLine();
  </script>
</body>
</html>
