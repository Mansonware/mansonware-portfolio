  <text x="70" y="225" font-family="Arial, sans-serif" font-size="70" font-weight="700" fill="#f4f7f8">AUTOMAÇÃO, IA E</text>
  <text x="70" y="310" font-family="Arial, sans-serif" font-size="70" font-weight="700" fill="#64ffa9">SISTEMAS WEB</text>
  <text x="72" y="390" font-family="Arial, sans-serif" font-size="28" fill="#aab6bc">Soluções digitais para negócios venderem mais,</text>
