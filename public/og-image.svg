    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111a23"/><stop offset="1" stop-color="#080c11"/></linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M60 0H0V60" fill="none" stroke="#ffffff" stroke-opacity=".035"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="#070a0f"/>
